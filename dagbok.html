<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Familjedagbok — Familjesajten</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest:    #3D5C3A;
      --forest-dk: #2a3f28;
      --forest-lt: #4e7349;
      --terra:     #A84C2A;
      --terra-lt:  #c4603a;
      --cream:     #F5F0E8;
      --cream-dim: rgba(245,240,232,0.65);
      --sand:      #E8DCC8;
      --bark:      #6B4C35;
      --ink:       #1C1810;
      --bg:        #F0EBE0;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Jost', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(61,92,58,0.96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .nav-brand { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 400; color: var(--cream); letter-spacing: 0.04em; text-decoration: none; }
    .nav-links {
      display: flex;
      gap: 0.1rem;
      overflow-x: auto;
      scrollbar-width: none;
      flex: 1;
      justify-content: center;
      padding: 0 0.5rem;
    }
    .nav-links::-webkit-scrollbar { display: none; }
    .nav-links a {
      color: rgba(245,240,232,0.75);
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 0.55rem;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.12); color: var(--cream); }
    .nav-logout { background: none; border: 1px solid rgba(245,240,232,0.25); color: rgba(245,240,232,0.6); font-family: 'Jost', sans-serif; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.35rem 0.8rem; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
    .nav-logout:hover { border-color: rgba(245,240,232,0.5); color: var(--cream); }
    .nav-hamburger { display: none; background: none; border: none; color: var(--cream); font-size: 1.5rem; cursor: pointer; padding: 0.3rem 0.6rem; line-height: 1; border-radius: 6px; transition: background 0.2s; }
    .nav-hamburger:hover { background: rgba(255,255,255,0.12); }
    .nav-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .nav-mobile-footer { display: none !important; }
    @media (max-width: 720px) {
      nav { flex-wrap: wrap; height: auto; min-height: 56px; padding: 0 1rem; position: relative; }
      .nav-brand { flex: 1; }
      .nav-hamburger { display: flex; align-items: center; }
      .nav-right { display: none; }
      .nav-links { display: none; width: 100%; flex-direction: column; gap: 0; padding: 0.5rem 0 0.8rem; overflow-y: auto; max-height: calc(100svh - 60px); justify-content: flex-start; order: 3; border-top: 1px solid rgba(255,255,255,0.1); }
      .nav-links.open { display: flex; }
      .nav-links a { font-size: 0.85rem; padding: 0.55rem 0.8rem; white-space: normal; border-radius: 8px; }
      .nav-mobile-footer { display: flex; gap: 0.5rem; padding: 0.6rem 0.8rem 0.2rem; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 0.2rem; }
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(160deg, var(--forest-dk) 0%, var(--forest) 60%, var(--bark) 100%);
      padding: 3.5rem 2rem 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 70%, rgba(168,76,42,0.2) 0%, transparent 60%);
    }
    .hero-content { position: relative; z-index: 1; }
    .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 3rem); font-weight: 300; color: var(--cream); letter-spacing: 0.04em; }
    .hero h1 em { font-style: italic; color: var(--sand); }
    .hero p { font-size: 0.8rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(245,240,232,0.5); margin-top: 0.5rem; }

    /* ── HUVUDLAYOUT ── */
    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── NYTT INLÄGG ── */
    .new-post-card {
      background: var(--cream);
      border-radius: 16px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.07), 0 0 0 1px rgba(61,92,58,0.08);
      padding: 1.8rem;
      margin-bottom: 2.5rem;
    }

    .new-post-card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--forest-dk);
      margin-bottom: 1.2rem;
    }

    /* Välj vem du är */
    .author-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .author-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.85rem;
      border-radius: 20px;
      border: 1.5px solid rgba(61,92,58,0.2);
      background: none;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      color: rgba(28,24,16,0.6);
      cursor: pointer;
      transition: all 0.15s;
    }
    .author-btn:hover { border-color: var(--forest); color: var(--forest); }
    .author-btn.selected { background: var(--forest); border-color: var(--forest); color: white; }

    /* Stamps */
    .stamp-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .stamp-btn {
      padding: 0.35rem 0.8rem;
      border-radius: 20px;
      border: 1.5px solid rgba(168,76,42,0.2);
      background: none;
      font-family: 'Jost', sans-serif;
      font-size: 0.75rem;
      color: rgba(107,76,53,0.7);
      cursor: pointer;
      transition: all 0.15s;
    }
    .stamp-btn:hover { border-color: var(--terra); color: var(--terra); }
    .stamp-btn.selected { background: var(--terra); border-color: var(--terra); color: white; }

    /* Textfält */
    .post-textarea {
      width: 100%;
      min-height: 120px;
      padding: 1rem;
      border: 1.5px solid rgba(61,92,58,0.15);
      border-radius: 10px;
      background: rgba(255,255,255,0.6);
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--ink);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }
    .post-textarea:focus { border-color: var(--forest); }
    .post-textarea::placeholder { color: rgba(28,24,16,0.35); }

    /* Foto-uppladdning */
    .photo-section {
      margin-bottom: 1rem;
    }

    .photo-label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border: 1.5px dashed rgba(61,92,58,0.3);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      color: rgba(61,92,58,0.7);
      transition: all 0.2s;
    }
    .photo-label:hover { border-color: var(--forest); color: var(--forest); background: rgba(61,92,58,0.04); }
    #photo-input { display: none; }

    .photo-previews {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.8rem;
    }

    .photo-thumb {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid rgba(61,92,58,0.15);
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-thumb .remove-photo {
      position: absolute;
      top: 2px;
      right: 2px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .upload-progress {
      font-size: 0.75rem;
      color: var(--forest);
      margin-top: 0.5rem;
    }

    /* Publicera-knapp */
    .btn-post {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1.8rem;
      background: linear-gradient(135deg, var(--forest-dk), var(--forest));
      border: none;
      border-radius: 8px;
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-post:hover { opacity: 0.9; }
    .btn-post:active { transform: scale(0.98); }
    .btn-post:disabled { opacity: 0.4; cursor: not-allowed; }

    #post-status {
      font-size: 0.82rem;
      margin-top: 0.7rem;
      color: var(--forest);
      min-height: 1.2em;
    }
    #post-status.error { color: #b83030; }

    /* ── INLÄGGSLISTA ── */
    .entries-section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 300;
      color: var(--forest-dk);
      margin-bottom: 1.5rem;
    }

    #entries-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .entry-card {
      background: var(--cream);
      border-radius: 14px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06), 0 0 0 1px rgba(61,92,58,0.07);
      overflow: hidden;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .entry-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.3rem 0.6rem;
      border-bottom: 1px solid rgba(61,92,58,0.07);
    }

    .entry-author {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .author-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--forest), var(--forest-lt));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .author-name {
      font-weight: 500;
      font-size: 0.88rem;
      color: var(--ink);
    }
    .entry-date {
      font-size: 0.72rem;
      color: rgba(28,24,16,0.45);
    }

    .entry-stamp {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }
    .stamp-historia { background: rgba(168,76,42,0.1); color: var(--terra); }
    .stamp-milstolpe { background: rgba(61,92,58,0.1); color: var(--forest); }
    .stamp-roligt    { background: rgba(201,169,110,0.15); color: #7a5e2a; }

    .entry-text {
      padding: 1rem 1.3rem;
      font-size: 0.92rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--ink);
      white-space: pre-wrap;
    }

    /* Foton i inlägg */
    .entry-photos {
      display: grid;
      gap: 4px;
      padding: 0 1.3rem 0.5rem;
    }
    .entry-photos.cols-1 { grid-template-columns: 1fr; }
    .entry-photos.cols-2 { grid-template-columns: 1fr 1fr; }
    .entry-photos.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

    .entry-photo {
      aspect-ratio: 4/3;
      overflow: hidden;
      border-radius: 8px;
      cursor: pointer;
    }
    .entry-photo img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .entry-photo:hover img { transform: scale(1.03); }

    /* Reaktioner */
    .entry-reactions {
      display: flex;
      gap: 0.5rem;
      padding: 0.7rem 1.3rem 1rem;
      border-top: 1px solid rgba(61,92,58,0.06);
    }

    .reaction-btn {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.7rem;
      border: 1.5px solid rgba(61,92,58,0.15);
      border-radius: 20px;
      background: none;
      cursor: pointer;
      font-size: 0.8rem;
      color: rgba(28,24,16,0.5);
      transition: all 0.15s;
    }
    .reaction-btn:hover { border-color: var(--terra); color: var(--terra); background: rgba(168,76,42,0.05); }
    .reaction-btn .count { font-weight: 500; }

    /* Laddningsindikator */
    .loading-dots {
      text-align: center;
      padding: 2rem;
      color: rgba(28,24,16,0.35);
      font-size: 0.85rem;
    }

    /* Ljusbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 95vw; max-height: 95vh; border-radius: 4px; object-fit: contain; }

    footer {
      background: var(--forest-dk);
      color: rgba(245,240,232,0.4);
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }
      .private-dropdown { position: relative; display: inline-flex; align-items: center; }
    .private-btn { background: none; border: 1px solid rgba(245,220,180,0.4); color: rgba(245,220,180,0.9); font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.35rem 0.7rem; border-radius: 6px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
    .private-btn:hover { background: rgba(245,220,180,0.15); }
    .private-menu { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: #2a3f28; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 0.4rem; min-width: 160px; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .private-dropdown.open .private-menu { display: flex; flex-direction: column; }
    .private-menu a { color: rgba(245,240,232,0.85); text-decoration: none; font-size: 0.82rem; padding: 0.5rem 0.8rem; border-radius: 6px; transition: background 0.15s; }
    .private-menu a:hover { background: rgba(255,255,255,0.1); color: white; }
  </style>
</head>

<script>
function addPrivateNavLinks(email) {
      const links = [];
      // Privata mappar konfigureras av familjen själva
      if (!links.length) return;
      const navRight = document.querySelector('.nav-right');
      if (!navRight) return;
      const wrap = document.createElement('div');
      wrap.className = 'private-dropdown';
      wrap.innerHTML = `<button class="private-btn">Min plats ▾</button><div class="private-menu">${links.map(l=>`<a href="${l.href}">${l.label}</a>`).join('')}</div>`;
      navRight.insertBefore(wrap, navRight.firstChild);
      wrap.querySelector('.private-btn').addEventListener('click', e => { e.stopPropagation(); wrap.classList.toggle('open'); });
      document.addEventListener('click', () => wrap.classList.remove('open'));
    }
</script>

        btn.className = 'author-btn';

          document.querySelectorAll('.author-btn').forEach(b => b.classList.remove('selected'));

    document.querySelectorAll('.stamp-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.stamp-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedStamp = btn.dataset.stamp;
      });
    });
    document.querySelector('.stamp-btn[data-stamp=""]').classList.add('selected');

    /* ─── FOTOVAL ─── */
    document.getElementById('photo-input').addEventListener('change', e => {
      const files = Array.from(e.target.files);
      files.forEach(file => {
        const url = URL.createObjectURL(file);
        pendingPhotos.push({ file, previewUrl: url, cloudinaryUrl: null });
      });
      renderPreviews();
      e.target.value = '';
    });

    function renderPreviews() {
      const container = document.getElementById('photo-previews');
      container.innerHTML = '';
      pendingPhotos.forEach((p, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'photo-thumb';
        wrap.innerHTML = `<img src="${p.previewUrl}" /><button class="remove-photo" onclick="removePhoto(${i})">✕</button>`;
        container.appendChild(wrap);
      });
    }

    function removePhoto(idx) {
      pendingPhotos.splice(idx, 1);
      renderPreviews();
    }

    /* ─── UPLOAD TILL CLOUDINARY ─── */
    async function uploadToCloudinary(file) {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', CLOUDINARY_PRESET);
      fd.append('folder', 'family_diary');

      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
        method: 'POST',
        body: fd
      });
      const data = await res.json();
      if (!data.secure_url) throw new Error('Cloudinary upload failed');
      return data.secure_url;
    }

    /* ─── PUBLICERA INLÄGG ─── */
    async function submitPost() {
      const text = document.getElementById('post-text').value.trim();
      const statusEl = document.getElementById('post-status');
      const btn = document.getElementById('post-btn');

      if (!selectedAuthor) { showStatus('Välj vem du är först.', 'error'); return; }
      if (!text && pendingPhotos.length === 0) { showStatus('Skriv något eller lägg till ett foto.', 'error'); return; }

      btn.disabled = true;

      // Ladda upp foton
      let photoUrls = [];
      if (pendingPhotos.length > 0) {
        showStatus(`Laddar upp ${pendingPhotos.length} foto(n)…`, '');
        try {
          for (let i = 0; i < pendingPhotos.length; i++) {
            document.getElementById('upload-progress').textContent = `Foto ${i + 1} av ${pendingPhotos.length}…`;
            const url = await uploadToCloudinary(pendingPhotos[i].file);
            photoUrls.push(url);
          }
          document.getElementById('upload-progress').textContent = '';
        } catch (err) {
          showStatus('Fotouppladdning misslyckades. Försök igen.', 'error');
          btn.disabled = false;
          return;
        }
      }

      showStatus('Sparar inlägg…', '');

      const { error } = await sb.from('memories').insert({
        author_name:  selectedAuthor.name,
        author_emoji: selectedAuthor.emoji,
        text:         text,
        photos:       photoUrls,
        stamp:        selectedStamp || null,
        reactions_heart: 0,
        reactions_smile: 0,
      });

      if (error) {
        showStatus('Kunde inte spara. Försök igen.', 'error');
        btn.disabled = false;
        return;
      }

      // Rensa formulär
      document.getElementById('post-text').value = '';
      pendingPhotos = [];
      renderPreviews();
      document.querySelectorAll('.stamp-btn').forEach(b => b.classList.remove('selected'));
      document.querySelector('.stamp-btn[data-stamp=""]').classList.add('selected');
      selectedStamp = '';

      showStatus('✓ Inlägg publicerat!', '');
      btn.disabled = false;

      loadEntries();
    }

    function showStatus(text, type) {
      const el = document.getElementById('post-status');
      el.textContent = text;
      el.className = type;
    }

    /* ─── LÄSA INLÄGG ─── */
    async function loadEntries() {
      const list = document.getElementById('entries-list');

      const { data, error } = await sb
        .from('memories')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(50);

      if (error || !data) {
        list.innerHTML = '<p style="text-align:center;color:#b83030;padding:2rem;">Kunde inte ladda inlägg.</p>';
        return;
      }

      if (data.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:rgba(28,24,16,0.4);padding:2rem;">Inga inlägg ännu — var den första att skriva!</p>';
        return;
      }

      list.innerHTML = '';
      data.forEach(entry => list.appendChild(renderEntry(entry)));
    }

    function renderEntry(e) {
      const card = document.createElement('div');
      card.className = 'entry-card';
      card.dataset.id = e.id;

      const date = new Date(e.created_at);
      const dateStr = date.toLocaleDateString('sv-SE', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });

      const stampClass = e.stamp === 'Familjehistoria' ? 'stamp-historia' : e.stamp === 'Milstolpe' ? 'stamp-milstolpe' : 'stamp-roligt';
      const stampHtml = e.stamp ? `<span class="entry-stamp ${stampClass}">${e.stamp}</span>` : '';

      const photos = Array.isArray(e.photos) ? e.photos : [];
      const colClass = photos.length === 1 ? 'cols-1' : photos.length === 2 ? 'cols-2' : 'cols-3';
      const photosHtml = photos.length ? `
        <div class="entry-photos ${colClass}">
          ${photos.map(url => `<div class="entry-photo" onclick="openLightbox('${url}')"><img src="${url}" loading="lazy" /></div>`).join('')}
        </div>` : '';

      card.innerHTML = `
        <div class="entry-header">
          <div class="entry-author">
            <div class="author-dot">${e.author_emoji || '🌿'}</div>
            <div>
              <div class="author-name">${e.author_name || 'Okänd'}</div>
              <div class="entry-date">${dateStr}</div>
            </div>
          </div>
          ${stampHtml}
        </div>
        ${e.text ? `<div class="entry-text">${escHtml(e.text)}</div>` : ''}
        ${photosHtml}
        <div class="entry-reactions">
          <button class="reaction-btn" onclick="react('${e.id}', 'heart', this)">
            ❤️ <span class="count">${e.reactions_heart || 0}</span>
          </button>
          <button class="reaction-btn" onclick="react('${e.id}', 'smile', this)">
            😄 <span class="count">${e.reactions_smile || 0}</span>
          </button>
          <button class="reaction-btn" onclick="deleteEntry('${e.id}', this)" style="margin-left:auto;color:#b83030;" title="Ta bort">🗑️</button>
          <button class="reaction-btn" onclick="editEntry('${e.id}', this)" style="color:#3D5C3A;" title="Redigera">✏️</button>
        </div>
      `;
      return card;
    }

    async function deleteEntry(id, btn) {
      if (!confirm('Ta bort det här inlägget?')) return;
      btn.disabled = true;
      const { error } = await sb.from('memories').delete().eq('id', id);
      if (error) { alert('Kunde inte ta bort: ' + error.message); btn.disabled = false; return; }
      const card = document.querySelector(`.entry-card[data-id="${id}"]`);
      if (card) card.remove();
    }

    async function editEntry(id, btn) {
      const card = document.querySelector(`.entry-card[data-id="${id}"]`);
      const textEl = card.querySelector('.entry-text');
      const currentText = textEl ? textEl.textContent : '';
      const newText = prompt('Redigera inlägg:', currentText);
      if (newText === null) return;
      const { error } = await sb.from('memories').update({ text: newText }).eq('id', id);
      if (error) { alert('Kunde inte spara: ' + error.message); return; }
      if (textEl) textEl.textContent = newText;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    /* ─── REAKTIONER ─── */
    async function react(id, type, btn) {
      const countEl = btn.querySelector('.count');
      const current = parseInt(countEl.textContent) || 0;
      const field = type === 'heart' ? 'reactions_heart' : 'reactions_smile';

      countEl.textContent = current + 1;

      await sb.from('memories')
        .update({ [field]: current + 1 })
        .eq('id', id);
    }

    /* ─── LJUSBOX ─── */
    function openLightbox(url) {
      document.getElementById('lightbox-img').src = url;
      document.getElementById('lightbox').classList.add('open');
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    /* ─── LOGOUT ─── */
    async function logOut() {
      await sb.auth.signOut();
      window.location.href = 'login.html';
    }

    /* ─── REALTID ─── */
    function subscribeRealtime() {
      sb.channel('memories')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'memories' }, payload => {
          const list = document.getElementById('entries-list');
          const card = renderEntry(payload.new);
          list.insertBefore(card, list.firstChild);
        })
        .subscribe();
    }

    let CURRENT_USER_EMAIL = '';
    const ADMIN_EMAIL = ''; // Sätt admin-email här

    /* ─── INIT ─── */
    async function init() {
      const { data } = await sb.auth.getSession();
      if (!data?.session) {
        window.location.href = 'login.html';
        return;
      }
      CURRENT_USER_EMAIL = data.session.user.email.toLowerCase();
      addPrivateNavLinks(CURRENT_USER_EMAIL);
      buildAuthorRow();
      await loadEntries();
      subscribeRealtime();
    }

    init();
  
    function toggleNav() {
      const nl = document.getElementById('navLinks');
      nl.classList.toggle('open');
    }
    document.addEventListener('DOMContentLoaded', function() {
      const nl = document.getElementById('navLinks');
      if (nl) nl.querySelectorAll('a').forEach(a => a.addEventListener('click', () => nl.classList.remove('open')));
    });
  </script>
  <script>
    (function(){
      var VERS_URL = "version.json?t=" + Date.now();
      var stored;
      fetch(VERS_URL).then(function(r){return r.json();}).then(function(d){
        stored = d.version;
      }).catch(function(){});
      setInterval(function(){
        if(!stored) return;
        fetch("version.json?t=" + Date.now()).then(function(r){return r.json();}).then(function(d){
          if(d.version !== stored && !document.getElementById("update-banner")){
            var b = document.createElement("div");
            b.id = "update-banner";
            b.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#3d5c3a;color:#f5f0e8;text-align:center;padding:0.75rem 1rem;z-index:9999;font-family:Jost,sans-serif;font-size:0.9rem;display:flex;align-items:center;justify-content:center;gap:1rem;box-shadow:0 -2px 12px rgba(0,0,0,0.2);";
            b.innerHTML = "✨ Sajten har uppdaterats! <button onclick='location.reload(true)' style='background:#fff;color:#3d5c3a;border:none;padding:0.35rem 0.9rem;border-radius:6px;cursor:pointer;font-weight:600;font-family:Jost,sans-serif;'>Ladda om</button>";
            document.body.appendChild(b);
          }
        }).catch(function(){});
      }, 300000);
    })();
  </script>
