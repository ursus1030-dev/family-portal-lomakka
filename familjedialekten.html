<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Familjedialekten — Familjesajten</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --forest:#3D5C3A; --forest-dk:#2a3f28; --forest-lt:#4e7349;
      --terra:#A84C2A; --terra-lt:#c4603a;
      --cream:#F5F0E8; --sand:#E8DCC8; --bark:#6B4C35;
      --gold:#C9A96E; --ink:#1C1810; --bg:#F0EBE0;
    }
    html { scroll-behavior:smooth; }
    body { font-family:'Jost',sans-serif; background:var(--bg); color:var(--ink); min-height:100vh; }

    nav { position:sticky; top:0; z-index:100; background:rgba(61,92,58,0.96); backdrop-filter:blur(10px); border-bottom:1px solid rgba(255,255,255,0.08); padding:0 2rem; display:flex; align-items:center; justify-content:space-between; height:60px; }
    .nav-brand { font-family:'Cormorant Garamond',serif; font-size:1.25rem; font-weight:400; color:var(--cream); letter-spacing:0.04em; text-decoration:none; }
    .nav-links {
      display: flex;
      gap: 0.1rem;
      overflow-x: auto;
      scrollbar-width: none;
      flex: 1;
      justify-content: flex-start;
      padding: 0 0.5rem;
    }
    .nav-links::-webkit-scrollbar { display: none; }
    .nav-links a {
      color: rgba(245,240,232,0.75);
      text-decoration: none;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.35rem 0.55rem;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .nav-links a:hover, .nav-links a.active { background:rgba(255,255,255,0.12); color:var(--cream); }
    .nav-logout { background:none; border:1px solid rgba(245,240,232,0.25); color:rgba(245,240,232,0.6); font-family:'Jost',sans-serif; font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase; padding:0.35rem 0.8rem; border-radius:6px; cursor:pointer; transition:all 0.2s; }
    .nav-logout:hover { border-color:rgba(245,240,232,0.5); color:var(--cream); }
    .nav-hamburger { display: none; background: none; border: none; color: var(--cream); font-size: 1.5rem; cursor: pointer; padding: 0.3rem 0.6rem; line-height: 1; border-radius: 6px; transition: background 0.2s; }
    .nav-hamburger:hover { background: rgba(255,255,255,0.12); }
    .nav-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .nav-mobile-footer { display: none !important; }
    @media (max-width: 1100px) {
      nav { flex-wrap: wrap; height: auto; min-height: 56px; padding: 0 1rem; position: relative; }
      .nav-brand { flex: 1; }
      .nav-hamburger { display: flex; align-items: center; }
      .nav-right { display: none; }
      .nav-links { display: none; width: 100%; flex-direction: column; gap: 0; padding: 0.5rem 0 0.8rem; overflow-y: auto; max-height: calc(100svh - 60px); justify-content: flex-start; order: 3; border-top: 1px solid rgba(255,255,255,0.1); }
      .nav-links.open { display: flex; }
      .nav-links a { font-size: 0.85rem; padding: 0.55rem 0.8rem; white-space: normal; border-radius: 8px; }
      .nav-mobile-footer { display: flex; gap: 0.5rem; padding: 0.6rem 0.8rem 0.2rem; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 0.2rem; }
    }

    .hero { background:linear-gradient(160deg,var(--forest-dk) 0%,var(--forest) 55%,var(--bark) 100%); padding:3rem 2rem 2.5rem; text-align:center; position:relative; overflow:hidden; }
    .hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 60% 20%,rgba(201,169,110,0.18) 0%,transparent 60%); }
    .hero-content { position:relative; z-index:1; }
    .hero h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(2rem,5vw,2.8rem); font-weight:300; color:var(--cream); letter-spacing:0.04em; }
    .hero h1 em { font-style:italic; color:var(--sand); }
    .hero p { font-size:0.8rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(245,240,232,0.5); margin-top:0.5rem; }

    .main { max-width:800px; margin:0 auto; padding:2rem 1.5rem 4rem; }

    /* TOOLBAR */
    .toolbar { display:flex; gap:1rem; align-items:center; margin-bottom:2rem; flex-wrap:wrap; }
    .search-wrap { flex:1; min-width:180px; position:relative; }
    .search-wrap input { width:100%; padding:0.7rem 1rem 0.7rem 2.5rem; border:1px solid rgba(61,92,58,0.2); border-radius:10px; font-family:'Jost',sans-serif; font-size:0.9rem; background:white; outline:none; transition:border-color 0.2s; }
    .search-wrap input:focus { border-color:var(--forest); }
    .search-icon { position:absolute; left:0.8rem; top:50%; transform:translateY(-50%); font-size:1rem; opacity:0.5; pointer-events:none; }
    .alpha-nav { display:flex; gap:0.2rem; flex-wrap:wrap; }
    .alpha-btn { width:28px; height:28px; border:1px solid rgba(61,92,58,0.15); border-radius:6px; background:white; font-size:0.75rem; font-weight:500; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; }
    .alpha-btn:hover { border-color:var(--forest); color:var(--forest); }
    .alpha-btn.active { background:var(--forest); color:white; border-color:var(--forest); }
    .btn-add-word { background:var(--terra); border:none; color:var(--cream); font-family:'Jost',sans-serif; font-size:0.8rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; padding:0.65rem 1.2rem; border-radius:10px; cursor:pointer; transition:background 0.2s; white-space:nowrap; }
    .btn-add-word:hover { background:var(--terra-lt); }

    /* WORD COUNT */
    .word-count { font-size:0.78rem; color:#aaa; margin-bottom:1.5rem; letter-spacing:0.05em; }

    /* WORD CARDS */
    .word-list { display:flex; flex-direction:column; gap:1rem; }
    .word-card { background:white; border-radius:14px; padding:1.4rem 1.5rem; box-shadow:0 2px 16px rgba(0,0,0,0.07); transition:transform 0.15s, box-shadow 0.15s; }
    .word-card:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,0.1); }
    .word-header { display:flex; align-items:flex-start; justify-content:space-between; gap:1rem; margin-bottom:0.6rem; }
    .word-term { font-family:'Cormorant Garamond',serif; font-size:1.7rem; font-weight:400; color:var(--forest-dk); line-height:1; }
    .word-initial { font-family:'Cormorant Garamond',serif; font-size:3rem; font-weight:300; color:rgba(61,92,58,0.08); line-height:1; flex-shrink:0; }
    .word-definition { font-size:0.92rem; line-height:1.65; color:var(--ink); margin-bottom:0.5rem; }
    .word-example { font-size:0.85rem; font-style:italic; color:#777; padding-left:1rem; border-left:3px solid rgba(61,92,58,0.2); margin-bottom:0.8rem; }
    .word-footer { display:flex; align-items:center; gap:1rem; }
    .word-author { font-size:0.72rem; color:#bbb; flex:1; }
    .heart-btn { background:none; border:1px solid rgba(168,76,42,0.2); border-radius:20px; padding:0.25rem 0.7rem; font-size:0.8rem; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:0.3rem; color:#999; }
    .heart-btn:hover { border-color:var(--terra); color:var(--terra); }
    .heart-btn.liked { background:rgba(168,76,42,0.08); border-color:var(--terra); color:var(--terra); }
    .word-delete { background:none; border:none; cursor:pointer; color:#ddd; font-size:1rem; padding:0.2rem; transition:color 0.2s; }
    .word-delete:hover { color:var(--terra); }

    /* LETTER DIVIDER */
    .letter-divider { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:300; color:var(--forest); opacity:0.4; padding:0.5rem 0 0.2rem; border-bottom:1px solid rgba(61,92,58,0.1); margin-bottom:0.8rem; margin-top:1rem; }

    /* MODAL */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center; padding:1.5rem; }
    .modal-overlay.open { display:flex; }
    .modal { background:white; border-radius:20px; padding:2rem; width:100%; max-width:500px; box-shadow:0 24px 80px rgba(0,0,0,0.25); animation:slideUp 0.25s ease; }
    @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal h2 { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:400; margin-bottom:1.4rem; }
    .modal label { display:block; font-size:0.72rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--forest); margin-bottom:0.35rem; margin-top:0.9rem; }
    .modal label:first-of-type { margin-top:0; }
    .modal input, .modal textarea, .modal select { width:100%; padding:0.7rem 0.9rem; border:1px solid #ddd; border-radius:8px; font-family:'Jost',sans-serif; font-size:0.9rem; color:var(--ink); background:#fafafa; outline:none; transition:border-color 0.2s; }
    .modal input:focus,.modal textarea:focus,.modal select:focus { border-color:var(--forest); background:white; }
    .modal textarea { resize:vertical; min-height:80px; }
    .modal-actions { display:flex; gap:0.8rem; margin-top:1.4rem; }
    .btn-save { flex:1; background:var(--forest); color:var(--cream); border:none; font-family:'Jost',sans-serif; font-size:0.85rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; padding:0.85rem; border-radius:8px; cursor:pointer; transition:background 0.2s; }
    .btn-save:hover { background:var(--forest-lt); }
    .btn-cancel { padding:0.85rem 1.2rem; border:1px solid #ddd; background:none; font-family:'Jost',sans-serif; font-size:0.85rem; color:#666; border-radius:8px; cursor:pointer; }
    .btn-cancel:hover { background:#f5f5f5; }

    .empty-state { text-align:center; padding:4rem; color:#bbb; }
    .empty-state .icon { font-size:4rem; margin-bottom:1rem; }

    footer { text-align:center; padding:2rem; font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase; color:rgba(28,24,16,0.3); border-top:1px solid rgba(28,24,16,0.08); }
      .private-dropdown { position: relative; display: inline-flex; align-items: center; }
    .private-btn { background: none; border: 1px solid rgba(245,220,180,0.4); color: rgba(245,220,180,0.9); font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.35rem 0.7rem; border-radius: 6px; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
    .private-btn:hover { background: rgba(245,220,180,0.15); }
    .private-menu { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: #2a3f28; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 0.4rem; min-width: 160px; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .private-dropdown.open .private-menu { display: flex; flex-direction: column; }
    .private-menu a { color: rgba(245,240,232,0.85); text-decoration: none; font-size: 0.82rem; padding: 0.5rem 0.8rem; border-radius: 6px; transition: background 0.15s; }
    .private-menu a:hover { background: rgba(255,255,255,0.1); color: white; }
  </style>
</head>
<body>

  <div class="hero">
    <div class="hero-content">
      <h1>Familje<em>dialekten</em></h1>
      <p>Ord & uttryck som bara er familj förstår</p>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Sök ord…" oninput="renderWords()" />
      </div>
      <div class="alpha-nav" id="alphaNave"></div>
      <button class="btn-add-word" onclick="openModal()">+ Nytt ord</button>
    </div>

    <div class="word-count" id="wordCount"></div>
    <div class="word-list" id="wordList">
      <div class="empty-state"><div class="icon">📖</div><p>Laddar ordboken…</p></div>
    </div>
  </div>

  <!-- Add word modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="handleOverlay(event)">
    <div class="modal">
      <h2>Lägg till ett ord</h2>
      <label>Ordet</label>
      <input type="text" id="newOrd" placeholder="T.ex. Gröding" />
      <label>Betydelse</label>
      <textarea id="newBetydelse" placeholder="Vad betyder ordet i er familj?" rows="2"></textarea>
      <label>Exempelmening (valfri)</label>
      <input type="text" id="newExempel" placeholder='"Det där var en riktig gröding!"' />
      <label>Vem hittade på det?</label>
      <select id="newUpphovsman">
        <option value="">— välj —</option>
        <option>Familjemedlem 1</option><option>Familjemedlem 2</option><option>Familjemedlem 3</option>
        <option>Familjemedlem 4</option><option>Familjemedlem 5</option><option>Familjemedlem 6</option><option>Familjemedlem 7</option><option>Familjemedlem 8</option>
        <option>Familjen</option>
      </select>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Avbryt</button>
        <button class="btn-save" onclick="saveWord()">Spara</button>
      </div>
    </div>
  </div>

  <footer><p>Din familjesajt &nbsp;·&nbsp; Dialekten &nbsp;·&nbsp; 2025</p></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
function addPrivateNavLinks(email) {
      const links = [];
      // Privata mappar konfigureras av familjen själva
      if (!links.length) return;
      const navRight = document.querySelector('.nav-right');
      if (!navRight) return;
      const wrap = document.createElement('div');
      wrap.className = 'private-dropdown';
      wrap.innerHTML = `<button class="private-btn">Min plats ▾</button><div class="private-menu">${links.map(l=>`<a href="${l.href}">${l.label}</a>`).join('')}</div>`;
      navRight.insertBefore(wrap, navRight.firstChild);
      wrap.querySelector('.private-btn').addEventListener('click', e => { e.stopPropagation(); wrap.classList.toggle('open'); });
      document.addEventListener('click', () => wrap.classList.remove('open'));
    }
</script>
  <script>
    const SUPABASE_URL  = 'https://equichnyxhbkpnpigavx.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxdWljaG55eGhia3BucGlnYXZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NTgyMDYsImV4cCI6MjA5NjMzNDIwNn0.skU-U27x66qMPDjmk0_SQZPsaVqP7JAigpcsSqFjX_A';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    let allWords    = [];
    let activeAlpha = 'alla';
    const likedWords = new Set(JSON.parse(localStorage.getItem('likedWords')||'[]'));

    sb.auth.getSession().then(({ data }) => {
      if (!data?.session) { window.location.href = 'login.html'; return; }
      addPrivateNavLinks((data.session||data?.session).user.email.toLowerCase());
      buildAlphaNav();
      loadWords();
    });
    async function logOut() { await sb.auth.signOut(); window.location.href = 'login.html'; }

    async function loadWords() {
      const { data } = await sb.from('dialekt_ord').select('*').order('ord', { ascending: true });
      allWords = data || [];
      renderWords();
    }

    function buildAlphaNav() {
      const nav = document.getElementById('alphaNave');
      const letters = ['alla','A','B','D','F','G','H','J','K','L','M','N','O','P','R','S','T','U'];
      letters.forEach(l => {
        const btn = document.createElement('button');
        btn.className = 'alpha-btn' + (l === 'alla' ? ' active' : '');
        btn.textContent = l === 'alla' ? '★' : l;
        btn.title = l === 'alla' ? 'Visa alla' : 'Ord som börjar med ' + l;
        btn.onclick = () => {
          activeAlpha = l;
          document.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderWords();
        };
        nav.appendChild(btn);
      });
    }

    function getFiltered() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      return allWords.filter(w => {
        const matchAlpha = activeAlpha === 'alla' || w.ord.toUpperCase().startsWith(activeAlpha);
        const matchQ     = !q || w.ord.toLowerCase().includes(q) || w.betydelse.toLowerCase().includes(q);
        return matchAlpha && matchQ;
      });
    }

    function renderWords() {
      const container = document.getElementById('wordList');
      const filtered  = getFiltered();
      document.getElementById('wordCount').textContent = `${allWords.length} ord i ordboken${filtered.length !== allWords.length ? ` · visar ${filtered.length}` : ''}`;

      if (!filtered.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📖</div><p>Inga ord hittade — lägg till familjens egna uttryck!</p></div>';
        return;
      }

      // Group by first letter
      const groups = {};
      filtered.forEach(w => {
        const letter = w.ord[0].toUpperCase();
        if (!groups[letter]) groups[letter] = [];
        groups[letter].push(w);
      });

      container.innerHTML = Object.keys(groups).sort().map(letter => `
        <div class="letter-divider">${letter}</div>
        ${groups[letter].map(w => `
          <div class="word-card" id="word-${w.id}">
            <div class="word-header">
              <div class="word-term">${w.ord}</div>
              <div class="word-initial">${w.ord[0].toUpperCase()}</div>
            </div>
            <div class="word-definition">${w.betydelse}</div>
            ${w.exempel ? `<div class="word-example">${w.exempel}</div>` : ''}
            <div class="word-footer">
              <div class="word-author">${w.upphovsman ? `Myntades av ${w.upphovsman}` : ''}</div>
              <button class="heart-btn ${likedWords.has(w.id) ? 'liked' : ''}" onclick="toggleHeart('${w.id}', ${w.reactions_heart})">
                ❤️ <span id="hearts-${w.id}">${w.reactions_heart||0}</span>
              </button>
              <button class="word-delete" onclick="deleteWord('${w.id}')" title="Ta bort">✕</button>
            </div>
          </div>
        `).join('')}
      `).join('');
    }

    async function toggleHeart(id, current) {
      const isLiked = likedWords.has(id);
      const newCount = isLiked ? Math.max(0, current-1) : current+1;
      if (isLiked) likedWords.delete(id); else likedWords.add(id);
      localStorage.setItem('likedWords', JSON.stringify([...likedWords]));
      await sb.from('dialekt_ord').update({ reactions_heart: newCount }).eq('id', id);
      // Update locally
      const w = allWords.find(x => x.id === id);
      if (w) w.reactions_heart = newCount;
      renderWords();
    }

    async function deleteWord(id) {
      if (!confirm('Ta bort det här ordet ur ordboken?')) return;
      await sb.from('dialekt_ord').delete().eq('id', id);
      await loadWords();
    }

    function openModal() { document.getElementById('modalOverlay').classList.add('open'); }
    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
    function handleOverlay(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

    async function saveWord() {
      const ord       = document.getElementById('newOrd').value.trim();
      const betydelse = document.getElementById('newBetydelse').value.trim();
      if (!ord)       { alert('Ange ett ord.'); return; }
      if (!betydelse) { alert('Ange en betydelse.'); return; }

      const { error } = await sb.from('dialekt_ord').insert({
        ord,
        betydelse,
        exempel:     document.getElementById('newExempel').value.trim() || null,
        upphovsman:  document.getElementById('newUpphovsman').value || null,
      });
      if (error) { alert('Fel: ' + error.message); return; }
      ['newOrd','newBetydelse','newExempel'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('newUpphovsman').value = '';
      closeModal();
      await loadWords();
    }
  
    function toggleNav() {
      const nl = document.getElementById('navLinks');
      nl.classList.toggle('open');
    }
    document.addEventListener('DOMContentLoaded', function() {
      const nl = document.getElementById('navLinks');
      if (nl) nl.querySelectorAll('a').forEach(a => a.addEventListener('click', () => nl.classList.remove('open')));
    });
  </script>
</body>
